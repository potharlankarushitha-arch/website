<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📋 Attendance Management System</h1>
            <p>Track student attendance efficiently</p>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Panel - Mark Attendance -->
            <div class="panel">
                <h2>📝 Mark Attendance</h2>
                <div class="form-group">
                    <label for="courseSelect">Select Course:</label>
                    <select id="courseSelect" onchange="loadStudents()">
                        <option value="">-- Choose Course --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="dateInput">Date:</label>
                    <input type="date" id="dateInput" value="">
                </div>

                <div id="studentList" class="student-list">
                    <!-- Student list will be populated here -->
                </div>

                <button onclick="saveAttendance()" class="btn-primary">Save Attendance</button>
            </div>

            <!-- Right Panel - View Reports -->
            <div class="panel">
                <h2>📊 Attendance Reports</h2>
                <div class="form-group">
                    <label for="reportCourseSelect">Filter by Course:</label>
                    <select id="reportCourseSelect" onchange="loadReport()">
                        <option value="">All Courses</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="reportDateInput">Filter by Date:</label>
                    <input type="date" id="reportDateInput" onchange="loadReport()">
                </div>

                <div class="report-summary">
                    <div class="summary-card">
                        <h3>Present</h3>
                        <span id="presentCount">0</span>
                    </div>
                    <div class="summary-card">
                        <h3>Absent</h3>
                        <span id="absentCount">0</span>
                    </div>
                    <div class="summary-card">
                        <h3>Late</h3>
                        <span id="lateCount">0</span>
                    </div>
                    <div class="summary-card">
                        <h3>Total</h3>
                        <span id="totalCount">0</span>
                    </div>
                </div>

                <div id="reportTable" class="report-table">
                    <!-- Report table will be populated here -->
                </div>
            </div>
        </div>

        <!-- Student Performance Section -->
        <div class="performance-section">
            <h2>🎯 Student Performance</h2>
            <div class="form-group">
                <label for="studentSelect">Select Student:</label>
                <select id="studentSelect" onchange="loadStudentPerformance()">
                    <option value="">-- Choose Student --</option>
                </select>
            </div>
            <div id="performanceChart" class="performance-chart">
                <!-- Performance chart will be displayed here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
